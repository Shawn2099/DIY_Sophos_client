ssid: YOUR_WIFI_SSID
portal_url: http://YOUR_PORTAL_IP:8090
username: YOUR_USERNAME
password: YOUR_PASSWORD

check_interval: 5
cooldown: 10
request_timeout: 2
reconnect_delay: 1
startup_fast_retry_seconds: 1

network_error_base_sleep: 2
network_error_max_sleep: 30

log_level: INFO
log_file: /var/log/sophos-wifi-client/sophos_wifi.log
log_max_bytes: 1048576
log_backup_count: 5
log_to_stdout: true

ssid_interface: ""
network_probe_enabled: true
network_probe_timeout: 1
ssid_check_enabled: true  # Set to false to skip SSID check
